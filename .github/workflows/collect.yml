name: daily-collect

on:
  schedule:
    - cron: '0 21 * * *'   # UTC 21:00 = 한국시간 오전 6시
  workflow_dispatch: {}     # Actions 탭에서 수동 실행 버튼 활성화

permissions:
  contents: write           # 수집 결과를 레포에 커밋하기 위해 필요

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: 테스트
        run: pytest

      - name: 수집 실행
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # 자동 제공 토큰, 별도 등록 불필요
        run: python collect.py

      - name: 수집 결과 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: $(date -u +%F) snapshot"
          git push
